<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>blackbox visualiser </title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:black;overflow:hidden;}
canvas,video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;}
canvas{z-index:1;}
#statusOverlay{position:absolute;top:12px;left:12px;right:12px;z-index:2;padding:10px 14px;border-radius:10px;background:rgba(0,0,0,0.55);color:#ffffff;font-family:Arial,Helvetica,sans-serif;font-size:12px;line-height:1.4;pointer-events:none;display:none;box-shadow:0 0 0 1px rgba(255,255,255,0.1);} 
#statusOverlay.warn{background:rgba(160,0,0,0.85);}
</style>
</head>
<body>
<video id="videoBg" autoplay muted playsinline style="display:none;"></video>
<canvas id="visual"></canvas>
<div id="statusOverlay"></div>

<script>
const canvas = document.getElementById("visual");
const ctx = canvas.getContext("2d");

let W = window.innerWidth;
let H = window.innerHeight;
canvas.width = W;
canvas.height = H;

const videoBg = document.getElementById("videoBg");
let cameraStream = null;

const params = {
  bgSource: "color",
  shapes: 1,
  size: 140,
  count: 1,
  shapeColor1: "#000000",
  shapeColor2: "#000000",
  shapeGradient: false,
  shapeAutoGradient: false,
  bgColor1: "#ffffff",
  bgColor2: "#ffffff",
  bgGradient: false,
  autoGradient: false,
  invertColors: false,
  animation: "bounce",
  placement: "normal",
  speed: 5,
  angle: 0,
  particles: [],
  gridEnabled: true,
  gridColor: "#000000",
  gridSpacing: 20,
  postFX: ["crt","threshold"],
  fxBuffers: {},
  strokeColor: "#ffffff",
  strokeWidth: 3,
  strokeEnabled: true,
  grainEnabled: true,
  micSyncEnabled: false,
  beatLevel: 0,
  energy: 0
};

let hasReceivedState = true;
let startupNoiseCanvas = null;
let analyser = null;
let audioData = new Uint8Array(512);
let bassLevel = 0;
let beatPulse = 0;
let lastBeatTime = 0;

const shapeTypes = ["none", "square", "random", "circle", "starburst", "worm"];

function detRandom(seed) {
    const x = Math.sin(seed * 12.9898 + 78.233) * 43758.5453;
    return x - Math.floor(x);
}

function generateStartupNoise(){
  const scale = 4;
  const w = Math.max(1, Math.floor(W / scale));
  const h = Math.max(1, Math.floor(H / scale));
  if (startupNoiseCanvas && startupNoiseCanvas.width === w && startupNoiseCanvas.height === h) return;
  startupNoiseCanvas = document.createElement('canvas');
  startupNoiseCanvas.width = w;
  startupNoiseCanvas.height = h;
  const nctx = startupNoiseCanvas.getContext('2d');
  const img = nctx.createImageData(w, h);
  const d = img.data;
  // deterministic-ish noise for a static startup look
  let seed = 1;
  function rnd() { seed = (seed * 9301 + 49297) % 233280; return seed / 233280; }
  for (let i = 0; i < d.length; i += 4) {
    const v = rnd() > 0.5 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 28;
  }
  nctx.putImageData(img, 0, 0);
}

const statusOverlay = document.getElementById("statusOverlay");
function setStatusMessage(message, warn = false){
  if(!message){
    statusOverlay.style.display = "none";
    statusOverlay.textContent = "";
    statusOverlay.classList.remove("warn");
    return;
  }
  statusOverlay.textContent = message;
  statusOverlay.style.display = "block";
  statusOverlay.classList.toggle("warn", warn);
}

let startupAngle = 0;

function drawStartupStatic(){
  // Opening scene: white background, single bouncing black box, small black grid, CRT+threshold FX
  ctx.fillStyle = params.bgColor1 || "#ffffff";
  ctx.fillRect(0, 0, W, H);

  generateStartupNoise();
  if (startupNoiseCanvas) {
    ctx.save();
    ctx.globalAlpha = 0.06;
    ctx.drawImage(startupNoiseCanvas, 0, 0, W, H);
    ctx.restore();
  }

  // Draw grid if enabled
  drawGrid();

  // single centered bouncing box
  const squareSize = Math.max(60, Math.min(W, H) * 0.20);
  const bounce = Math.sin(startupAngle * 2.2) * (H * 0.06);
  const x = W / 2;
  const y = H / 2 + bounce;

  ctx.save();
  ctx.translate(x, y);
  ctx.fillStyle = "#000000";
  ctx.fillRect(-squareSize / 2, -squareSize / 2, squareSize, squareSize);
  ctx.restore();

  // increment to animate bounce
  startupAngle += 0.045;

  // ensure opening postFX include crt and threshold
  if(!params.postFX || (params.postFX.length===1 && params.postFX[0]==='none')){
    params.postFX = ["crt","threshold"];
  } else {
    if(!params.postFX.includes("crt")) params.postFX.push("crt");
    if(!params.postFX.includes("threshold")) params.postFX.push("threshold");
  }

  // apply post effects to mimic final look
  applyPostFX();
}

async function initCamera(type){
  if(cameraStream){ cameraStream.getTracks().forEach(t=>t.stop()); cameraStream=null; videoBg.style.display="none"; }
  if(type==="color"){ videoBg.style.display="none"; setStatusMessage(""); return; }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    setStatusMessage("Camera not supported in this browser. Reverting to color background.", true);
    params.bgSource = "color";
    return;
  }
  try {
    const devices = await navigator.mediaDevices.enumerateDevices();
    let target = devices.find(d=>d.kind==="videoinput");
    if(type==="macbookCam") target = devices.find(d=>/FaceTime/i.test(d.label)) || target;
    if(type==="usbCam") target = devices.find(d=>/USB/i.test(d.label)) || target;
    if(!target){
      setStatusMessage("No camera found. Reverting to color background.", true);
      params.bgSource = "color";
      return;
    }
    const constraints = {video:{deviceId: target.deviceId}};
    cameraStream = await navigator.mediaDevices.getUserMedia(constraints);
    videoBg.srcObject = cameraStream;
    await videoBg.play();
    videoBg.style.display="block";
    setStatusMessage("Camera source enabled. Allow access if prompted.", false);
  } catch(e){
    console.warn("Camera error", e);
    setStatusMessage("Camera access denied or unavailable. Reverting to color background.", true);
    params.bgSource = "color";
    videoBg.style.display="none";
  }
}

function shapePath(type, size, index){
  ctx.beginPath();
  if(type==="square") ctx.rect(-size/2, -size/2, size, size);
  else if(type==="circle") ctx.arc(0, 0, size/2, 0, Math.PI*2);
  else if(type==="random"){
    const numPoints = 12; 
    const points = [];
    const seed = index * 100; 
    for(let i=0; i<numPoints; i++){
      const angle = (i / numPoints) * Math.PI * 2 - Math.PI/2;
      const r = (size/2) * (0.3 + detRandom(seed + i) * 0.7);
      const angleJitter = (detRandom(seed + i + 1000) - 0.5) * 0.25;
      points.push({ x: Math.cos(angle + angleJitter) * r, y: Math.sin(angle + angleJitter) * r });
    }
    const firstMidX = (points[0].x + points[numPoints-1].x) / 2;
    const firstMidY = (points[0].y + points[numPoints-1].y) / 2;
    ctx.moveTo(firstMidX, firstMidY);
    for(let i = 0; i < numPoints; i++){
        const p1 = points[i];
        const p2 = points[(i + 1) % numPoints];
        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;
        ctx.quadraticCurveTo(p1.x, p1.y, midX, midY);
    }
    ctx.closePath();
  } 
  else if(type==="starburst"){
    const spikes = 16;
    const inner = size * 0.18;
    const outer = size * 0.55;
    for(let i = 0; i < spikes * 2; i++){
      const radius = (i % 2 === 0) ? outer : inner;
      const a = (i * Math.PI) / spikes - Math.PI/2;
      const x = Math.cos(a) * radius;
      const y = Math.sin(a) * radius;
      if(i===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.closePath();
  } 
  else if(type==="worm"){
    const segments = 24;
    const amplitude = size * 0.22;
    const length = size * 1.1;
    ctx.moveTo(-length/2, 0);
    for(let i = 1; i <= segments; i++){
      const t = i / segments;
      const x = -length/2 + t * length;
      const y = Math.sin(t * Math.PI * 2.5 + params.angle) * amplitude;
      const prevT = (i - 1) / segments;
      const prevX = -length/2 + prevT * length;
      const prevY = Math.sin(prevT * Math.PI * 2.5 + params.angle) * amplitude;
      const cx = (prevX + x) / 2;
      const cy = (prevY + y) / 2;
      ctx.quadraticCurveTo(prevX, prevY, cx, cy);
    }
  }
}

function drawGrid(){
  if(!params.gridEnabled) return;
  ctx.save();
  ctx.strokeStyle = params.gridColor;
  ctx.lineWidth = 1;
  for(let x=0;x<=W;x+=params.gridSpacing){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for(let y=0;y<=H;y+=params.gridSpacing){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }
  ctx.restore();
}

function updateAudio() {
  if (!params.micSyncEnabled || !analyser) {
    params.beatLevel = 0;
    beatPulse = 0;
    return;
  }

  analyser.getByteFrequencyData(audioData);

  let bass = 0;
  for (let i = 1; i <= 6; i++) bass += audioData[i];
  bass /= 6;

  let mid = 0;
  for (let i = 8; i <= 20; i++) mid += audioData[i];
  mid /= 13;

  const sensitivity = Math.max(0.2, Math.min(1, params.micSensitivity || 0.5));
  const currentBass = bass / 255;
  const currentMid = mid / 255;

  bassLevel = bassLevel * 0.72 + currentBass * 0.28;

  const beatThreshold = 0.60 - (sensitivity - 0.5) * 0.10;
  const transientFactor = 1.95 - (sensitivity - 0.5) * 0.18;
  const now = Date.now();
  const isBassHit = currentBass > beatThreshold && currentBass > currentMid * 1.25;
  const isTransient = currentBass > bassLevel * transientFactor;
  const strongBeat = isBassHit && isTransient && currentMid < 0.6 && (now - lastBeatTime > 200);

  if (strongBeat) {
    beatPulse = 1.4 + Math.min(1.2, currentBass * 1.6);
    lastBeatTime = now;
    if (typeof window.showBeat === "function") window.showBeat();
  }

  beatPulse *= 0.58;
  params.beatLevel = Math.max(bassLevel * 2.0, beatPulse * 1.2);
  params.energy = bassLevel;
}

function getReactiveScale() {
  return 1.0 + params.beatLevel * 1.65;
}

function drawShapeVisual(size, index){
  const currentShape = shapeTypes[Math.floor(params.shapes)];
  if(currentShape === "none") return;

  const react = getReactiveScale();
  const flash = params.beatLevel > 1.1 ? (params.beatLevel - 1.1) * 0.9 : 0;

  let shapeColor1 = params.shapeColor1;
  let shapeColor2 = params.shapeColor2;
  if (params.shapeAutoGradient) {
    const hue = (params.angle * 12 + index * 12) % 360;
    shapeColor1 = `hsl(${hue}, 92%, 60%)`;
    shapeColor2 = `hsl(${(hue + 85) % 360}, 90%, 55%)`;
  }

  if (params.shapeGradient) {
    const g = ctx.createLinearGradient(-size, -size, size, size);
    g.addColorStop(0, shapeColor1);
    g.addColorStop(1, shapeColor2);
    ctx.fillStyle = g;
  } else {
    ctx.fillStyle = (index % 2 === 0 ? shapeColor1 : shapeColor2);
  }

  if (flash > 0.2) {
    const hueShift = (params.angle * 18 + index * 22 + flash * 98) % 360;
    const pulseColor = `hsl(${hueShift}, ${72 + flash * 16}%, ${48 + flash * 18}%)`;
    if (params.shapeGradient) {
      const fg = ctx.createLinearGradient(-size, -size, size, size);
      fg.addColorStop(0, pulseColor);
      fg.addColorStop(1, shapeColor2);
      ctx.fillStyle = fg;
    } else {
      ctx.fillStyle = pulseColor;
    }
    ctx.shadowColor = pulseColor;
    ctx.shadowBlur = Math.min(22, flash * 32);
    ctx.globalAlpha = 0.94 + Math.min(0.06, flash * 0.06);
  } else {
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  if(params.strokeEnabled){
    ctx.strokeStyle = params.strokeColor;
    ctx.lineWidth = params.strokeWidth * (2 + params.beatLevel * 3);
  }

  shapePath(currentShape, size * react, index);
  ctx.fill();
  if(params.strokeEnabled) ctx.stroke();

  if (flash > 0.4) {
    ctx.save();
    ctx.globalAlpha = flash * 0.55;
    ctx.fillStyle = "#ffffcc";
    shapePath(currentShape, size * react * 0.9, index);
    ctx.fill();
    ctx.restore();
  }
}

function applyPostFX(){
  let image = ctx.getImageData(0,0,W,H);
  const d = image.data;
  const intensity = params.beatLevel || 0;

  if(params.invertColors){
    for(let i=0;i<d.length;i+=4){ d[i]=255-d[i]; d[i+1]=255-d[i+1]; d[i+2]=255-d[i+2]; }
  }

  if(params.postFX.includes("threshold")){
    const avg = d.reduce((sum, val, idx) => idx % 4 === 0 ? sum + (d[idx] + d[idx+1] + d[idx+2]) / 3 : sum, 0) / (d.length / 4);
    const t = Math.min(180, Math.max(96, 120 + intensity * 18 - (avg - 128) * 0.15));
    for(let i=0;i<d.length;i+=4){
      const v = (d[i] + d[i+1] + d[i+2]) / 3;
      const c = v > t ? 255 : (v > t * 0.7 ? 128 : 24);
      d[i] = d[i+1] = d[i+2] = c;
    }
  }

  if(params.postFX.includes("posterize")){
    const levels = 5;
    for(let i=0;i<d.length;i+=4){
      d[i]   = Math.floor(d[i]   / 255 * levels) * Math.floor(255 / (levels - 1));
      d[i+1] = Math.floor(d[i+1] / 255 * levels) * Math.floor(255 / (levels - 1));
      d[i+2] = Math.floor(d[i+2] / 255 * levels) * Math.floor(255 / (levels - 1));
    }
  }

  if(params.postFX.includes("duotone")){
    const c1 = [40, 20, 120];
    const c2 = [255, 200, 70];
    for(let i=0;i<d.length;i+=4){
      const lum = (d[i] * 0.299 + d[i+1] * 0.587 + d[i+2] * 0.114) / 255;
      d[i]   = c1[0] + (c2[0] - c1[0]) * lum;
      d[i+1] = c1[1] + (c2[1] - c1[1]) * lum;
      d[i+2] = c1[2] + (c2[2] - c1[2]) * lum;
    }
  }

  if(params.postFX.includes("pixelate")){
    const grid = Math.max(6, Math.floor(20 - intensity * 16));
    for(let y=0;y<H;y+=grid){
      for(let x=0;x<W;x+=grid){
        const idx = ((y * W) + x) * 4;
        const r = d[idx], g = d[idx+1], b = d[idx+2], a = d[idx+3];
        for(let yy=y; yy<y+grid && yy<H; yy++){
          for(let xx=x; xx<x+grid && xx<W; xx++){
            const i2 = ((yy * W) + xx) * 4;
            d[i2]=r; d[i2+1]=g; d[i2+2]=b; d[i2+3]=a;
          }
        }
      }
    }
  }

  if(params.postFX.includes("crt")){
    const scan = 3 + Math.floor(intensity * 3);
    for(let y=0;y<H;y+=scan){
      const lineBias = 0.86 + Math.sin(y * 0.065 + params.angle * 0.18) * 0.08;
      for(let x=0;x<W;x++){
        const idx = ((y * W) + x) * 4;
        d[idx]   = Math.min(255, d[idx] * lineBias);
        d[idx+1] = Math.min(255, d[idx+1] * lineBias);
        d[idx+2] = Math.min(255, d[idx+2] * lineBias);
      }
    }
    const wobble = Math.sin(params.angle * 0.18) * 0.24 * intensity;
    if (wobble > 0.03) {
      for(let y=0;y<H;y+=5){
        const shift = Math.floor((Math.sin(y * 0.045 + params.angle * 0.22) * 0.5 + 0.5) * wobble * 2);
        for(let x=0;x<W-shift;x++){
          const idx = ((y * W) + x) * 4;
          const idx2 = ((y * W) + x + shift) * 4;
          d[idx2] = d[idx];
          d[idx2+1] = d[idx+1];
          d[idx2+2] = d[idx+2];
        }
      }
    }
  }

  if(params.postFX.includes("feedback")){
    if(!params.fxBuffers.feedback){
      const buf = document.createElement('canvas');
      buf.width = W;
      buf.height = H;
      params.fxBuffers.feedback = buf;
      const fctx = buf.getContext('2d');
      fctx.clearRect(0, 0, W, H);
      fctx.drawImage(canvas, 0, 0, W, H);
    }
  }

  ctx.putImageData(image,0,0);

  if(params.postFX.includes("feedback")){
    const fb = params.fxBuffers.feedback;
    ctx.save();
    ctx.globalCompositeOperation = 'source-over';
    ctx.globalAlpha = 0.42 + intensity * 0.24;
    ctx.drawImage(fb, -2, 0, W + 4, H);
    ctx.drawImage(fb, 2, 0, W + 4, H);
    ctx.restore();

    const fctx = fb.getContext('2d');
    fctx.save();
    fctx.globalCompositeOperation = 'source-over';
    fctx.fillStyle = `rgba(0,0,0,${0.02 + intensity * 0.018})`;
    fctx.fillRect(0, 0, W, H);
    fctx.globalAlpha = 0.48 + intensity * 0.24;
    fctx.drawImage(canvas, 0, 0, W, H);
    fctx.restore();
  }

  if(params.postFX.includes("glitch")){
    const tempC = document.createElement('canvas');
    tempC.width = W; tempC.height = H;
    const tempCtx = tempC.getContext('2d');
    tempCtx.putImageData(image, 0, 0);

    const sliceCount = 10 + Math.round(intensity * 14);
    const baseShift = 18 + intensity * 72;
    const layerAlpha = 0.22 + intensity * 0.34;

    ctx.save();
    for (let i = 0; i < sliceCount; i++) {
      const sliceH = 8 + Math.random() * 120;
      const sliceY = Math.floor(Math.random() * Math.max(1, H - sliceH));
      const xShift = Math.floor((Math.random() - 0.5) * baseShift * (0.55 + Math.random() * 0.7));
      ctx.globalAlpha = 0.65 + Math.random() * 0.25;
      ctx.drawImage(tempC, 0, sliceY, W, sliceH, xShift, sliceY, W, sliceH);

      if (Math.random() > 0.35) {
        ctx.globalCompositeOperation = 'screen';
        ctx.globalAlpha = layerAlpha * 0.95;
        ctx.drawImage(tempC, 0, sliceY, W, sliceH, xShift * -0.45, sliceY, W, sliceH);
        ctx.globalCompositeOperation = 'source-over';
      }
    }

    const offset = Math.floor(6 + intensity * 24);
    ctx.globalAlpha = 0.18 + intensity * 0.30;
    ctx.drawImage(tempC, offset, 0, W - offset, H, 0, 0, W - offset, H);
    ctx.drawImage(tempC, 0, 0, W - offset, H, offset, 0, W - offset, H);
    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = 0.14 + intensity * 0.22;
    ctx.drawImage(tempC, 0, 0, W, H, -3 - intensity * 4, 0, W, H);
    ctx.globalAlpha = 0.14 + intensity * 0.22;
    ctx.drawImage(tempC, 0, 0, W, H, 3 + intensity * 4, 0, W, H);
    ctx.restore();

    ctx.save();
    ctx.globalCompositeOperation = 'difference';
    ctx.globalAlpha = 0.08 + intensity * 0.16;
    ctx.drawImage(tempC, 0, 0, W, H);
    ctx.restore();
  }
}

function updateAutoGradient() {
  if (!params.autoGradient) return;
  const hue = (params.angle * 12) % 360;
  params.bgColor1 = `hsl(${hue}, 85%, 55%)`;
  params.bgColor2 = `hsl(${(hue + 110) % 360}, 90%, 45%)`;
}

function draw(){
  if (!hasReceivedState) {
    drawStartupStatic();
    requestAnimationFrame(draw);
    return;
  }

  updateAudio();
  updateAutoGradient();

  if(params.bgSource==="color"){
    if(params.bgGradient || params.autoGradient){
      const g=ctx.createLinearGradient(0,0,W,H);
      g.addColorStop(0,params.bgColor1); 
      g.addColorStop(1,params.bgColor2);
      ctx.fillStyle=g;
    } else ctx.fillStyle = params.bgColor1;
    ctx.fillRect(0,0,W,H);
  } else if(videoBg.readyState>=2) {
    ctx.drawImage(videoBg,0,0,W,H);
  }

  drawGrid();

  if((params.placement==="scatter" || params.animation==="rain") && (!params.particles || params.particles.length!==params.count)){
    params.particles = [];
    for(let i=0;i<params.count; i++){
      params.particles.push({
        x:Math.random()*W,
        y:Math.random()*(H*1.2) - H*0.2,
        vx:(Math.random()-0.5)*params.speed*0.06,
        vy:(Math.random()-0.5)*params.speed*0.06,
        rainOffset: Math.random() * 1000 
      });
    }
  }

  const reactScale = getReactiveScale();

  for(let i=0;i<params.count; i++){
    ctx.save();
    let x=0, y=0;
    let baseX = 0, baseY = 0;
    const p = params.particles[i];

    if(params.placement==="scatter"){
      if(p){
        if(params.animation !== "rain"){
          p.x += p.vx * (0.56 + params.beatLevel * 0.28);
          p.y += p.vy * (0.56 + params.beatLevel * 0.28);
          if(p.x > W || p.x < 0) p.vx *= -1;
          if(p.y > H || p.y < 0) p.vy *= -1;
          baseY = p.y - H/2;
        } else {
          baseY = 0;
        }
        baseX = p.x - W/2;
      }
    } else if(params.placement==="vertical"){
      baseX = 0;
      baseY = ((i / Math.max(1, params.count - 1)) - 0.5) * H * 0.92;
    } else if(params.placement==="horizontal"){
      baseX = ((i / Math.max(1, params.count - 1)) - 0.5) * W * 0.92;
      baseY = 0;
    }

    let sz = params.size * reactScale * 0.9;

    if(params.animation==="bounce"){
        x = baseX;
        y = baseY + Math.sin(params.angle * 1.8 + i * 0.65) * (H * 0.18) * reactScale;
    }
    else if(params.animation==="pulse"){
        x = baseX;
        y = baseY;
        sz *= 0.85 + Math.pow(Math.sin(params.angle * 4.8 + i), 3) * (0.5 + params.beatLevel * 0.7);
    }
    else if(params.animation==="wave"){
        x = baseX;
        y = baseY;
        ctx.rotate(Math.sin(params.angle * 3.6 + i) * 0.38 * reactScale);
        ctx.scale(1 + params.beatLevel * 0.28, 1 - params.beatLevel * 0.18);
    }
    else if(params.animation==="rain"){
        const fallOffset = (params.angle * params.speed * 2.1 + (p ? p.rainOffset : i * 37)) % (H * 2.2);
        x = baseX;
        y = baseY + fallOffset - H * 0.95;
        y += Math.sin(params.angle * 0.004 + i * 0.8) * H * 0.04;
    }

    ctx.translate(W/2 + x, H/2 + y);
    ctx.rotate(Math.sin(params.angle * 2) * 0.12 * reactScale);

    drawShapeVisual(sz, i); 
    ctx.restore();
  }

  params.angle += params.speed * 0.0034 * (1 + params.beatLevel * 0.75);

  if(params.grainEnabled){
    let img = ctx.getImageData(0,0,W,H), d = img.data;
    const grainStrength = 25 + params.beatLevel * 65;
    for(let i = 0; i < d.length; i += 4){
      let n = (Math.random()-0.5) * grainStrength;
      d[i] += n; d[i+1] += n; d[i+2] += n;
    }
    ctx.putImageData(img,0,0);
  }

  applyPostFX();
  requestAnimationFrame(draw);
}

window.addEventListener("resize", () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  params.fxBuffers = {};
});

draw();

// Send current visual params to opener/parent once so controllers can reflect the startup static
function sendCurrentState(){
  try{
    const snapshot = Object.assign({}, params);
    if(window.parent && window.parent !== window) window.parent.postMessage({type:'visualState', state: snapshot}, '*');
    if(window.opener && !window.opener.closed) window.opener.postMessage({type:'visualState', state: snapshot}, '*');
  }catch(e){/* ignore */}
}
setTimeout(sendCurrentState, 150);

window.addEventListener("message", async e => {
  const d = e.data;
  if(!d || typeof d !== 'object') return;

  // Do NOT automatically switch out of the startup scene on every incoming message.
  // Only activate the full visual when the message includes an explicit activation flag,
  // or when the user interacts with the page.

  if("bgSource" in d){
    params.bgSource = d.bgSource;
    await initCamera(d.bgSource);
  }

  // Merge any provided params so the controller can probe current values, but do not
  // treat this as the 'start' signal unless the message asks to apply to the visual.
  const clone = Object.assign({}, d);
  delete clone.type; // ignore message envelope fields
  if(Object.keys(clone).length) Object.assign(params, clone);

  // If the controller explicitly requests activation, switch to the main visual loop.
  if(d.activateVisual === true || d.applyToVisual === true || d.type === 'activate'){
    hasReceivedState = true;
  }

  if("micSyncEnabled" in d){
    params.micSyncEnabled = d.micSyncEnabled;
    if(d.micSyncEnabled && !analyser){
      try {
        const stream = await navigator.mediaDevices.getUserMedia({audio:true});
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 512;
        analyser.smoothingTimeConstant = 0.65;
        source.connect(analyser);
      } catch(err){ console.warn("Visual mic sync failed", err); }
    } else if (!d.micSyncEnabled && analyser) {
      analyser = null;
    }
  }
});

// User interaction should also activate the visual (click, keypress, or touch)
function activateFromUser(){
  if(!hasReceivedState){ hasReceivedState = true; }
}
window.addEventListener('click', activateFromUser, {passive:true});
window.addEventListener('keydown', activateFromUser, {passive:true});
window.addEventListener('touchstart', activateFromUser, {passive:true});
</script>
