<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>blackbox controller</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
:root {
  --color-btnface: #c0c0c0;
  --color-highlight: #e4e4e4;
  --color-shadow: #808080;
  --color-darkshadow: #696969;
  --color-window: #ffffff;
  --color-windowtext: #000000;
  --color-btntext: #000000;
  --color-graytext: #696969;
  --color-bg: #c0c0c0;
  --color-titlebg: #000080;
  --color-titletext: #ffffff;
}

body {
  margin: 0;
  padding: 20px;
  font-family: "MS Sans Serif", "Microsoft Sans Serif", Tahoma, Arial, sans-serif;
  font-size: 11px;
  background-color: var(--color-bg);
  color: var(--color-windowtext);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  box-sizing: border-box;
}

#controller {
  width: 100%;
  max-width: 420px;
  padding: 12px;
  background: var(--color-window);
  border-top: 2px solid var(--color-highlight);
  border-left: 2px solid var(--color-highlight);
  border-bottom: 2px solid var(--color-shadow);
  border-right: 2px solid var(--color-shadow);
  box-shadow:
    3px 3px 0 0 var(--color-shadow),
    5px 5px 0 0 var(--color-darkshadow);
}

h2 { 
  margin: -12px -12px 20px -12px;
  padding: 4px 12px;
  text-align: left;
  color: var(--color-titletext);
  font-weight: normal;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  background: linear-gradient(to right, #0a2a8a 0%, #1f5bd6 45%, #5296fb 100%);
  border-bottom: 1px solid #0a2a8a;
}

.groupbox {
  margin: 12px 0 12px 0;
  padding: 8px 12px 8px 12px;
  border-top: 1px solid var(--color-highlight);
  border-left: 1px solid var(--color-highlight);
  border-bottom: 1px solid var(--color-shadow);
  border-right: 1px solid var(--color-shadow);
}

.groupbox legend {
  color: var(--color-windowtext);
  font-weight: bold;
  font-size: 11px;
  padding: 0 6px 0 4px;
  background: var(--color-window);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.subgroup { margin: 6px 0 0 20px; }

label { 
  display: block; 
  margin: 8px 0 4px 0; 
  font-size: 11px;
}

input[type="number"], input[type="range"], select {
  width: 100%; 
  padding: 2px 4px; 
  background: var(--color-window); 
  color: var(--color-windowtext); 
  font-family: inherit;
  font-size: 11px; 
  box-sizing: border-box;
  border-top: 1px solid var(--color-shadow);
  border-left: 1px solid var(--color-shadow);
  border-bottom: 1px solid var(--color-highlight);
  border-right: 1px solid var(--color-highlight);
}

input[type="color"] {
  height: 22px;
  width: 50px;
  padding: 1px;
}

input[type="checkbox"] {
  position: relative;
  appearance: none;
  width: 16px;
  height: 16px;
  background: var(--color-window);
  border-top: 1px solid var(--color-shadow);
  border-left: 1px solid var(--color-shadow);
  border-bottom: 1px solid var(--color-highlight);
  border-right: 1px solid var(--color-highlight);
  vertical-align: middle;
  margin: 1px 6px 0 0;
  cursor: pointer;
}

input[type="checkbox"]:checked::after {
  content: "";
  position: absolute;
  top: 2px; left: 3px;
  width: 5px; height: 9px;
  border: solid var(--color-windowtext);
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
}

input[type="range"] {
  width: 100%;
  height: 18px;
  background: transparent;
  margin: 6px 0;
}
input[type="range"]::-webkit-slider-runnable-track {
  height: 14px;
  background: var(--color-btnface);
  border-top: 1px solid var(--color-highlight);
  border-left: 1px solid var(--color-highlight);
  border-bottom: 1px solid var(--color-shadow);
  border-right: 1px solid var(--color-shadow);
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 18px;
  background: var(--color-window);
  border-top: 1px solid var(--color-highlight);
  border-left: 1px solid var(--color-highlight);
  border-bottom: 1px solid var(--color-shadow);
  border-right: 1px solid var(--color-shadow);
  margin-top: -2px;
  cursor: pointer;
}
input[type="range"]::-moz-range-track {
  height: 14px;
  background: var(--color-btnface);
  border-top: 1px solid var(--color-highlight);
  border-left: 1px solid var(--color-highlight);
  border-bottom: 1px solid var(--color-shadow);
  border-right: 1px solid var(--color-shadow);
}
input[type="range"]::-moz-range-thumb {
  width: 14px;
  height: 18px;
  background: var(--color-window);
  border-top: 1px solid var(--color-highlight);
  border-left: 1px solid var(--color-highlight);
  border-bottom: 1px solid var(--color-shadow);
  border-right: 1px solid var(--color-shadow);
  cursor: pointer;
}
input[type="range"]::-ms-track {
  height: 14px;
  background: transparent;
  border-color: transparent;
  color: transparent;
}
input[type="range"]::-ms-fill-lower,
input[type="range"]::-ms-fill-upper {
  background: var(--color-btnface);
  border-top: 1px solid var(--color-highlight);
  border-left: 1px solid var(--color-highlight);
  border-bottom: 1px solid var(--color-shadow);
  border-right: 1px solid var(--color-shadow);
}
input[type="range"]::-ms-thumb {
  width: 14px;
  height: 18px;
  background: var(--color-window);
  border-top: 1px solid var(--color-highlight);
  border-left: 1px solid var(--color-highlight);
  border-bottom: 1px solid var(--color-shadow);
  border-right: 1px solid var(--color-shadow);
  cursor: pointer;
}

button { 
  width: 100%; 
  padding: 5px 12px; 
  background: var(--color-btnface); 
  color: var(--color-btntext); 
  font: inherit;
  font-weight: normal; 
  cursor: pointer; 
  margin: 4px 0;
  text-align: center;
  border-top: 1px solid var(--color-highlight);
  border-left: 1px solid var(--color-highlight);
  border-bottom: 1px solid var(--color-shadow);
  border-right: 1px solid var(--color-shadow);
}
button:hover { background: #d4d4d4; }
button:active { 
  border-top-color: var(--color-shadow);
  border-left-color: var(--color-shadow);
  border-bottom-color: var(--color-highlight);
  border-right-color: var(--color-highlight);
  padding: 6px 11px 4px 13px;
  margin: 5px 0 3px 0;
}

.colorPreview {
  display: inline-block; 
  width: 18px; height: 18px; 
  margin-left: 5px; 
  vertical-align: middle; 
  border: 1px solid #808080;
}

.hidden { display: none; }
select[multiple] { height: 100px; }

.system-preamble {
  margin-bottom: 12px;
  padding: 8px 10px;
  font-size: 10px;
  line-height: 1.35;
  color: var(--color-windowtext);
  background: #f4f4f4;
  border: 1px solid #808080;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.system-preamble .warning {
  color: #800000;
  font-weight: bold;
}

#micSyncLabel { margin-top:12px; font-weight:bold; font-size: 12px; }
#micStatus { font-size:10px; margin:4px 0 8px 22px; min-height: 14px; }
#beatIndicator {
  font-size: 10px;
  color: #ff8800;
  font-weight: bold;
  margin-left: 22px;
  opacity: 0;
  transition: opacity 0.4s;
}
</style>
</head>
<body>
<div id="controller">
<h2>blackbox controller</h2>

<div class="system-preamble">
  'OPEN VISUAL' IS THE LIVE CONTROLLED OUTPUT.<br><br>
  ADJUST PARAMETERS BELOW — CHANGES ARE REFLECTED IN REAL TIME IN THE VISUAL OUTPUT WINDOW.<br><br>
  <span class="warning">NOTE: THIS EXPERIENCE IS NOT OPTIMIZED FOR MOBILE DEVICES.</span>
</div>

<fieldset class="groupbox">
<legend>SYSTEM</legend>
<button id="openVisual">[ OPEN VISUAL ]</button>
<button id="randomize">[ I'M FEELING LUCKY ]</button>

<label id="micSyncLabel">
  <input type="checkbox" id="micSyncEnabled"> 
  MIC MODE (MUSIC REACTIVE)
</label>
<label>mic sensitivity: <input type="range" id="micSensitivity" min="20" max="100" value="60"></label>
<div id="micStatus"></div>
<div id="beatIndicator">♪ BEAT DETECTED ♪</div>

<div id="bgColorControls">
  <label>BG Color A:
    <input type="color" id="bgColor1" value="#000000">
    <span id="bgColor1Preview" class="colorPreview"></span>
  </label>
  <label>BG Color B:
    <input type="color" id="bgColor2" value="#000000">
    <span id="bgColor2Preview" class="colorPreview"></span>
  </label>
  <label><input type="checkbox" id="bgGradient"> Gradient Mode</label>
  <label><input type="checkbox" id="autoGradient"> Auto Cycle</label>
  <label>Background Source:
    <select id="bgSource">
      <option value="color">Color</option>
      <option value="macbookCam">MacBook Cam</option>
      <option value="usbCam">USB Cam</option>
    </select>
  </label>
</div>

<label><input type="checkbox" id="gridEnabled"> Show Grid</label>
<div id="gridControls" class="subgroup hidden">
  <label>Grid Color:
    <input type="color" id="gridColor" value="#222222">
    <span id="gridColorPreview" class="colorPreview"></span>
  </label>
  <label>Spacing: <input type="range" id="gridSpacing" min="5" max="200" value="50"></label>
</div>
</fieldset>

<fieldset class="groupbox">
<legend>OBJECT</legend>
<label>Shape Style: 
  <input type="range" id="shapes" min="0" max="5" value="0" step="1" style="width:60%; display:inline-block; margin-left:10px;"> 
  <span id="shapeLabel" style="margin-left:10px;">[NONE]</span>
</label>
<label>Size: <input type="range" id="size" min="10" max="500" value="120"></label>
<label>Quantity: <input type="range" id="count" min="0" max="200" value="12"></label>
</fieldset>

<fieldset class="groupbox">
<legend>STYLE</legend>
<label>Fill Color A:
  <input type="color" id="shapeColor1" value="#000000">
  <span id="shapeColor1Preview" class="colorPreview"></span>
</label>
<label>Fill Color B:
  <input type="color" id="shapeColor2" value="#000000">
  <span id="shapeColor2Preview" class="colorPreview"></span>
</label>
<label><input type="checkbox" id="shapeGradient"> Shape Gradient</label>
<label><input type="checkbox" id="shapeAutoGradient"> Auto Cycle</label>

<label><input type="checkbox" id="strokeEnabled"> Stroke Enabled</label>
<label>Stroke Color:
  <input type="color" id="strokeColor" value="#ffffff">
  <span id="strokeColorPreview" class="colorPreview"></span>
</label>
<label>Width: <input type="range" id="strokeWidth" min="1" max="20" value="3"></label>
</fieldset>

<fieldset class="groupbox">
<legend>ANIMATION</legend>
<label>Placement:
  <select id="placement">
    <option value="normal">[CENTER]</option>
    <option value="scatter">[SCATTER]</option>
    <option value="vertical">[STACK V]</option>
    <option value="horizontal">[STACK H]</option>
  </select>
</label>
<label>Motion:
  <select id="animation">
    <option value="bounce">[BOUNCE]</option>
    <option value="pulse">[PULSE]</option>
    <option value="wave">[WAVE]</option>
    <option value="rain">[RAIN]</option>
  </select>
</label>
<label>Speed: <input type="range" id="speed" min="0.1" max="40" step="0.1" value="5"></label>
<label><input type="checkbox" id="invertColors"> Invert Colors</label>
</fieldset>

<fieldset class="groupbox">
<legend>POST FX</legend>
<label>Select FX (Hold Ctrl/Cmd):
  <select id="postFX" multiple size="5" style="margin-top: 5px;">
    <option value="none" selected>None</option>
    <option value="pixelate">Pixelate</option>
    <option value="crt">CRT</option>
    <option value="threshold">Threshold</option>
    <option value="posterize">Posterize</option>
    <option value="feedback">Feedback</option>
    <option value="glitch">Glitch</option>
    <option value="duotone">Duotone</option>
  </select>
</label>
<label><input type="checkbox" id="grainEnabled" checked> Film Grain</label>
</fieldset>

<script>
let visualWindow = null;
let audioContext = null;
let analyser = null;
let micStream = null;

const shapeNames = ["✕", "■", "✦", "⏺", "✴", "⌇"];
const allFX = ["none", "pixelate", "crt", "threshold", "posterize", "feedback", "glitch", "duotone"];

const micToggle = document.getElementById("micSyncEnabled");
const micStatus = document.getElementById("micStatus");
const beatIndicator = document.getElementById("beatIndicator");

micToggle.addEventListener("change", async () => {
  if (micToggle.checked) {
    try {
      micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const source = audioContext.createMediaStreamSource(micStream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.65;
      source.connect(analyser);
      
      micStatus.textContent = "✅ MIC CONNECTED — BASS / MUSIC REACTIVE";
      micStatus.style.color = "#00cc00";
      
      if (visualWindow && !visualWindow.closed) {
        visualWindow.postMessage({ micSyncEnabled: true }, "*");
      }
    } catch (e) {
      micStatus.textContent = "❌ MIC ACCESS DENIED";
      micStatus.style.color = "#cc0000";
      micToggle.checked = false;
    }
  } else {
    if (micStream) micStream.getTracks().forEach(t => t.stop());
    if (audioContext) audioContext.close();
    analyser = null;
    micStream = null;
    micStatus.textContent = "";
    beatIndicator.style.opacity = 0;
    
    if (visualWindow && !visualWindow.closed) {
      visualWindow.postMessage({ micSyncEnabled: false }, "*");
    }
  }
});

function getCurrentState(){
  return {
    shapes: parseFloat(document.getElementById("shapes").value),
    size: parseFloat(document.getElementById("size").value),
    count: parseFloat(document.getElementById("count").value),
    shapeColor1: document.getElementById("shapeColor1").value,
    shapeColor2: document.getElementById("shapeColor2").value,
    shapeGradient: document.getElementById("shapeGradient").checked,
    shapeAutoGradient: document.getElementById("shapeAutoGradient").checked,
    bgColor1: document.getElementById("bgColor1").value,
    bgColor2: document.getElementById("bgColor2").value,
    bgGradient: document.getElementById("bgGradient").checked,
    autoGradient: document.getElementById("autoGradient").checked,
    bgSource: document.getElementById("bgSource").value,
    invertColors: document.getElementById("invertColors").checked,
    animation: document.getElementById("animation").value,
    placement: document.getElementById("placement").value,
    speed: parseFloat(document.getElementById("speed").value),
    gridEnabled: document.getElementById("gridEnabled").checked,
    gridColor: document.getElementById("gridColor").value,
    gridSpacing: parseFloat(document.getElementById("gridSpacing").value),
    grainEnabled: document.getElementById("grainEnabled").checked,
    strokeColor: document.getElementById("strokeColor").value,
    strokeWidth: parseFloat(document.getElementById("strokeWidth").value),
    strokeEnabled: document.getElementById("strokeEnabled").checked,
    postFX: Array.from(document.getElementById("postFX").selectedOptions).map(opt => opt.value),
    micSyncEnabled: micToggle.checked,
    micSensitivity: parseFloat(document.getElementById("micSensitivity").value) / 100
  };
}

function syncVisualState(){
  if (visualWindow && !visualWindow.closed) {
    visualWindow.postMessage(getCurrentState(), "*");
  }
}

function openVisualWindow(){
  if(visualWindow && !visualWindow.closed){
    visualWindow.focus();
    syncVisualState();
    return;
  }

  const screenLeft = window.screen.availLeft ?? window.screenX ?? window.screenLeft ?? 0;
  const screenTop = window.screen.availTop ?? window.screenY ?? window.screenTop ?? 0;
  const screenWidth = window.screen.availWidth ?? window.innerWidth;
  const screenHeight = window.screen.availHeight ?? window.innerHeight;

  const ctrlLeft = window.screenX ?? window.screenLeft ?? screenLeft;
  const ctrlTop = window.screenY ?? window.screenTop ?? screenTop;
  const ctrlWidth = window.outerWidth || Math.min(800, screenWidth);
  const ctrlHeight = window.outerHeight || Math.min(900, screenHeight);

  const rightSpace = screenLeft + screenWidth - (ctrlLeft + ctrlWidth);
  const leftSpace = ctrlLeft - screenLeft;

  let left = ctrlLeft + ctrlWidth;
  if (rightSpace < ctrlWidth && leftSpace >= ctrlWidth) {
    left = Math.max(screenLeft, ctrlLeft - ctrlWidth);
  } else if (rightSpace < ctrlWidth) {
    left = screenLeft + 20;
  }

  const width = ctrlWidth;
  const height = ctrlHeight;
  const top = ctrlTop;
  const features = `toolbar=no,location=no,status=no,menubar=no,scrollbars=no,resizable=yes,width=${width},height=${height},left=${left},top=${top}`;

  visualWindow = window.open("visual.html", "visual", features);
  if (visualWindow) {
    visualWindow.focus();
    setTimeout(syncVisualState, 250);
  }
}

document.getElementById("openVisual").addEventListener("click", openVisualWindow);

document.getElementById("randomize").addEventListener("click", () => {
  const r = () => Math.random();
  const randInt = (min, max) => Math.floor(min + r() * (max - min + 1));
  const brightColor = () => {
    const h = randInt(0, 360);
    const s = randInt(70, 100);
    const l = randInt(45, 70);
    return `hsl(${h}, ${s}%, ${l}%)`;
  };

  document.getElementById("shapes").value = randInt(1, 5);
  document.getElementById("size").value = randInt(50, 260);
  document.getElementById("count").value = randInt(10, 48);
  document.getElementById("speed").value = (randInt(8, 120) / 10).toFixed(1);

  const baseHue = randInt(0, 360);
  const altHue = (baseHue + 130) % 360;
  document.getElementById("shapeColor1").value = `hsl(${baseHue}, 96%, 58%)`;
  document.getElementById("shapeColor2").value = `hsl(${(baseHue + 45) % 360}, 92%, 62%)`;
  document.getElementById("bgColor1").value   = `hsl(${altHue}, 72%, 22%)`;
  document.getElementById("bgColor2").value   = `hsl(${(altHue + 40) % 360}, 60%, 35%)`;
  document.getElementById("strokeColor").value = `hsl(${(baseHue + 180) % 360}, 90%, 72%)`;
  document.getElementById("gridColor").value   = `hsl(${(altHue + 30) % 360}, 50%, 40%)`;
  document.getElementById("bgSource").value = "color";

  document.getElementById("shapeGradient").checked = r() > 0.25;
  document.getElementById("shapeAutoGradient").checked = r() > 0.45;
  document.getElementById("bgGradient").checked    = true;
  document.getElementById("autoGradient").checked  = r() > 0.6;
  document.getElementById("strokeEnabled").checked = true;
  document.getElementById("grainEnabled").checked  = true;
  document.getElementById("invertColors").checked  = false;
  document.getElementById("gridEnabled").checked   = r() > 0.45;

  document.getElementById("gridSpacing").value = randInt(25, 120);
  document.getElementById("strokeWidth").value = randInt(2, 7);
  document.getElementById("micSensitivity").value = randInt(20, 100);

  const placements = ["normal","scatter","vertical","horizontal"];
  const animations = ["bounce","pulse","wave","rain"];
  document.getElementById("placement").value = placements[randInt(0,3)];
  document.getElementById("animation").value = animations[randInt(0,3)];

  const fxSelect = document.getElementById("postFX");
  Array.from(fxSelect.options).forEach(opt => opt.selected = false);
  const numFX = r() < 0.35 ? 2 : (r() < 0.7 ? 3 : 5);
  if (r() < 0.25) fxSelect.options[0].selected = true;
  else {
    const shuffled = allFX.filter(f => f !== "none").sort(() => 0.5 - r());
    for (let i = 0; i < numFX && i < shuffled.length; i++) {
      const option = Array.from(fxSelect.options).find(opt => opt.value === shuffled[i]);
      if (option) option.selected = true;
    }
  }

  const event = new Event('input');
  document.querySelectorAll('input, select').forEach(el => el.dispatchEvent(event));

  const shapeVal = parseInt(document.getElementById("shapes").value);
  document.getElementById("shapeLabel").textContent = `[${shapeNames[shapeVal]}]`;
});

const shapesSlider = document.getElementById("shapes");
const shapeLabel = document.getElementById("shapeLabel");
shapesSlider.addEventListener("input", e => {
  const val = Math.floor(parseFloat(e.target.value));
  shapeLabel.textContent = `[${shapeNames[val]}]`;
});

const inputs = ["shapes","size","count","shapeColor1","shapeColor2","shapeGradient","shapeAutoGradient","bgColor1","bgColor2","bgGradient","autoGradient","bgSource","micSensitivity","invertColors","animation","placement","speed","gridEnabled","gridColor","gridSpacing","grainEnabled","strokeColor","strokeWidth","strokeEnabled","postFX"];

inputs.forEach(id => {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener("input", () => {
    let value;
    if (el.type === "checkbox") value = el.checked;
    else if (el.type === "range" || el.type === "number") value = parseFloat(el.value);
    else if (id === "postFX") value = Array.from(el.selectedOptions).map(opt => opt.value);
    else if (id === "micSensitivity") value = parseFloat(el.value) / 100;
    else value = el.value;

    if (visualWindow && !visualWindow.closed) {
      visualWindow.postMessage({[id]: value}, "*");
    }
  });
});

["bgColor1","bgColor2","shapeColor1","shapeColor2","gridColor","strokeColor"].forEach(id => {
  const input = document.getElementById(id);
  const preview = document.getElementById(id + "Preview");
  if (input && preview) {
    input.addEventListener("input", e => preview.style.backgroundColor = e.target.value);
    preview.style.backgroundColor = input.value;
  }
});

const gridEnabled = document.getElementById("gridEnabled");
const gridControls = document.getElementById("gridControls");
gridEnabled.addEventListener("change", () => gridControls.classList.toggle("hidden", !gridEnabled.checked));

gridControls.classList.toggle("hidden", !gridEnabled.checked);
shapeLabel.textContent = `[${shapeNames[0]}]`;

function setDefaultScene(){
  const defaults = {
    bgColor1: "#000000",
    bgColor2: "#000000",
    bgGradient: false,
    autoGradient: false,
    bgSource: "color",
    gridEnabled: false,
    gridSpacing: 50,
    shapes: 0,
    size: 120,
    count: 12,
    shapeColor1: "#000000",
    shapeColor2: "#000000",
    shapeGradient: false,
    shapeAutoGradient: false,
    strokeEnabled: false,
    strokeColor: "#ffffff",
    strokeWidth: 3,
    placement: "normal",
    animation: "bounce",
    speed: 5,
    invertColors: false,
    grainEnabled: true,
    micSensitivity: 60,
    postFX: ["none"]
  };

  Object.entries(defaults).forEach(([id, value]) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (el.type === "checkbox") el.checked = value;
    else if (id === "postFX") {
      Array.from(el.options).forEach(option => {
        option.selected = option.value === "none";
      });
    } else el.value = value;
  });
  shapeLabel.textContent = `[${shapeNames[0]}]`;
}

setDefaultScene();

document.querySelectorAll('input, select').forEach(el => el.dispatchEvent(new Event('input')));

window.showBeat = function() {
  if (beatIndicator) {
    beatIndicator.style.opacity = 1;
    setTimeout(() => { beatIndicator.style.opacity = 0; }, 180);
  }
};
</script>
</body>
</html>
